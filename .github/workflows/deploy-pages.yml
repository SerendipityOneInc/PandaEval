name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches: [main, dev]
    paths:
      - 'results/**'
      - 'docs/**'
      - 'bin/generate_dashboard.py'

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  SITE_BASE_URL: ${{ vars.SITE_BASE_URL }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate dashboard
        run: python bin/generate_dashboard.py

      - name: Generate sitemap
        run: |
          python -c "
          import os, urllib.parse
          from datetime import datetime, timezone

          base_url = os.environ['SITE_BASE_URL']
          docs_dir = 'docs'
          today = datetime.now(timezone.utc).strftime('%Y-%m-%d')

          html_files = []
          for root, dirs, files in os.walk(docs_dir):
              for f in sorted(files):
                  if f.endswith('.html'):
                      rel = os.path.relpath(os.path.join(root, f), docs_dir)
                      html_files.append(rel)
          html_files.sort()

          lines = ['<?xml version=\"1.0\" encoding=\"UTF-8\"?>']
          lines.append('<urlset xmlns=\"http://www.sitemaps.org/schemas/sitemap/0.9\">')
          for f in html_files:
              parts = f.split('/')
              encoded = '/'.join(urllib.parse.quote(p, safe='') for p in parts)
              priority = '1.0' if f == 'index.html' else '0.6'
              lines.append('  <url>')
              lines.append(f'    <loc>{base_url}{encoded}</loc>')
              lines.append(f'    <lastmod>{today}</lastmod>')
              lines.append(f'    <priority>{priority}</priority>')
              lines.append('  </url>')
          lines.append('</urlset>')

          with open(os.path.join(docs_dir, 'sitemap.xml'), 'w') as out:
              out.write('\n'.join(lines) + '\n')
          print(f'Generated sitemap.xml with {len(html_files)} URLs')
          "

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
